<!doctype html>
<!-- Neuro-Commerce OS · Action Card (MCP App) — generic renderer for tool outputs.
     Host pushes {type:"render", data:{title, subtitle, kpis:[{label,value}], options:[{id,label,detail,cost,quality,recommended}], actions:[{tool,label,params}]}} -->
<html lang="en"><head><meta charset="utf-8"><title>Action Card</title><style>
  :root{--navy:#0B1E3C;--cyan:#4CD7FF;--violet:#7B4DFF;--gray:#6B7280;--grad:linear-gradient(90deg,#7B4DFF,#E056FD,#4CD7FF,#2F80ED)}
  *{box-sizing:border-box;margin:0}body{font:14px/1.5 'Segoe UI',system-ui,sans-serif;background:var(--navy);color:#fff;padding:18px}
  .brand{font-size:10px;letter-spacing:.18em;color:var(--cyan);text-transform:uppercase}
  h1{font-size:19px;margin:2px 0 2px}.sub{color:#9CA3AF;font-size:12px;margin-bottom:12px}
  .kpis{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .kpi{background:rgba(255,255,255,.06);border:1px solid rgba(76,215,255,.18);border-radius:8px;padding:8px 14px;text-align:center}
  .kpi b{display:block;font-size:17px;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .kpi span{font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:.08em}
  .opt{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;transition:border .15s}
  .opt:hover{border-color:var(--cyan)}.opt.rec{border-color:rgba(123,77,255,.6)}
  .opt .top{display:flex;justify-content:space-between;align-items:center}
  .opt b{font-size:14px}.tag{font-size:9px;letter-spacing:.1em;background:var(--grad);padding:2px 8px;border-radius:10px;text-transform:uppercase}
  .opt p{font-size:12px;color:#9CA3AF;margin:4px 0 8px}
  .meter{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--gray)}
  .track{flex:1;height:5px;border-radius:3px;background:rgba(255,255,255,.12)}.fill{height:5px;border-radius:3px;background:var(--grad)}
  .actions{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
  .actions button{background:var(--grad);border:0;color:#fff;font-weight:600;padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px}
</style></head><body>
  <div class="brand">Neuro-Commerce OS · Action Card</div>
  <h1 id="title">—</h1><div class="sub" id="subtitle"></div>
  <div class="kpis" id="kpis"></div>
  <div id="options"></div>
  <div class="actions" id="actions"></div>
<script>
  function pct(x){return Math.max(0,Math.min(100,Math.round(x*100)))}
  function render(d){if(!d)return;
    document.getElementById('title').textContent=d.title||'Action';
    document.getElementById('subtitle').textContent=d.subtitle||'';
    document.getElementById('kpis').innerHTML=(d.kpis||[]).map(k=>'<div class="kpi"><b>'+k.value+'</b><span>'+k.label+'</span></div>').join('');
    document.getElementById('options').innerHTML=(d.options||[]).map(o=>
      '<div class="opt'+(o.recommended?' rec':'')+'" onclick="pick(\''+o.id+'\')"><div class="top"><b>'+o.label+'</b>'+(o.recommended?'<span class="tag">Recommended</span>':'')+'</div><p>'+(o.detail||'')+'</p>'+
      (o.quality!=null?'<div class="meter">quality<div class="track"><div class="fill" style="width:'+pct(o.quality)+'%"></div></div></div>':'')+
      (o.cost!=null?'<div class="meter">cost<div class="track"><div class="fill" style="width:'+pct(o.cost)+'%"></div></div></div>':'')+'</div>').join('');
    document.getElementById('actions').innerHTML=(d.actions||[]).map((a,i)=>'<button onclick="act('+i+')">'+a.label+'</button>').join('');
    window._actions=d.actions||[];}
  function pick(id){parent.postMessage({type:'intent',intent:'select',option:id},'*')}
  function act(i){const a=window._actions[i];parent.postMessage({type:'intent',intent:'tool',tool:a.tool,params:a.params||{}},'*')}
  window.addEventListener('message',e=>{if(e.data&&e.data.type==='render')render(e.data.data)});
  parent.postMessage({type:'ready',app:'action-card'},'*');
</script></body></html>
